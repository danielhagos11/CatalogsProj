name: Product Catalog CI

permissions:
  contents: write
  id-token: write

concurrency:
  group: product-catalog-ci
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - development
      - master
    types:
      - closed

  workflow_dispatch:

jobs:
  build:
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/workflow-reusable.yml
