name: Catalog CI
permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - development
      - master
      - feature/**

  workflow_dispatch:

jobs:
  workflow:
    uses: ./.github/workflows/workflow-reusable.yml
    with:
      mode: publish
      app-name: test-catalog-web-api
