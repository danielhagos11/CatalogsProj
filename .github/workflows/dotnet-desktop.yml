
name: Catalog CI
permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master

  workflow_dispatch:
  workflow_call:

jobs:
  workflow:
    uses: ./.github/workflows/workflow-reusable.yml
    with:
      mode: publish
      app-name: test-catalog-web-api
    secrets:
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
