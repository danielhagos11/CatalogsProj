name: Publish to Azure DevOps Artifacts

on:
  push:
    branches:
      - development
      - main

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add Azure Artifacts feed
        run: |
          dotnet nuget add source \
            "https://pkgs.dev.azure.com/${{ secrets.ADO_ORG_NAME }}/${{ secrets.ADO_PROJECT_NAME }}/_packaging/${{ secrets.ADO_FEED_NAME }}/nuget/v3/index.json" \
            --name AzureArtifacts \
            --username github \
            --password ${{ secrets.ADO_PAT }} \
            --store-password-in-clear-text
    
      - name: Authenticate to Azure Artifacts
        run: |
          export VSS_NUGET_EXTERNAL_FEED_ENDPOINTS='{"endpointCredentials":[{"endpoint":"https://pkgs.dev.azure.com/${{ secrets.ADO_ORG_NAME }}/${{ secrets.ADO_PROJECT_NAME }}/_packaging/${{ secrets.ADO_FEED_NAME }}/nuget/v3/index.json","username":"github","password":"${{ secrets.ADO_PAT }}"}]}'
          export NUGET_AUDIT_MODE=off
          dotnet restore Catalogs.sln --ignore-failed-sources

      - name: Restore
        run: dotnet restore Catalogs.sln

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: |
          dotnet pack \
            --configuration Release \
            --no-build \
            -o ./nupkgs \
            -p:Version=1.0.${{ github.run_number }}

      - name: Push package to Azure DevOps Artifacts
        run: |
          export VSS_NUGET_EXTERNAL_FEED_ENDPOINTS='{"endpointCredentials":[{"endpoint":"https://pkgs.dev.azure.com/${{ secrets.ADO_ORG_NAME }}/${{ secrets.ADO_PROJECT_NAME }}/_packaging/${{ secrets.ADO_FEED_NAME }}/nuget/v3/index.json","username":"github","password":"${{ secrets.ADO_PAT }}"}]}'
          dotnet nuget push "./nupkgs/*.nupkg" \
            --source "https://pkgs.dev.azure.com/${{ secrets.ADO_ORG_NAME }}/${{ secrets.ADO_PROJECT_NAME }}/_packaging/${{ secrets.ADO_FEED_NAME }}/nuget/v3/index.json" \
            --skip-duplicate

