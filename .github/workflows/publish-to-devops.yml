name: Publish to Azure DevOps Artifacts

on:
  push:
    branches:
      - development
      - main

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add Azure Artifacts feed
        run: |
          dotnet nuget add source \
            "https://pkgs.dev.azure.com/${{ secrets.ADO_ORG_NAME }}/${{ secrets.ADO_PROJECT_NAME }}/_packaging/${{ secrets.ADO_FEED_NAME }}/nuget/v3/index.json" \
            --name AzureArtifacts \
            --username github \
            --password ${{ secrets.AZURE_DEVOPS_PAT }} \
            --store-password-in-clear-text
            
      - name: Create isolated NuGet.config
        run: |
              cat <<EOF > NuGet.config
              <?xml version="1.0" encoding="utf-8"?>
              <configuration>
                <packageSources>
                  <clear />
                  <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
                  <add key="AzureArtifacts" value="https://pkgs.dev.azure.com/${{ secrets.ADO_ORG_NAME }}/${{ secrets.ADO_PROJECT_NAME }}/_packaging/${{ secrets.ADO_FEED_NAME }}/nuget/v3/index.json" />
                </packageSources>
                <packageSourceCredentials>
                  <AzureArtifacts>
                    <add key="Username" value="AzureDevOps" />
                    <add key="ClearTextPassword" value="${{ secrets.AZURE_DEVOPS_PAT }}" />
                  </AzureArtifacts>
                </packageSourceCredentials>
              </configuration>
              EOF

      - name: Restore (isolated)
        run: dotnet restore --configfile NuGet.config --disable-parallel /p:NuGetAudit=false

      - name: Build
        run: dotnet build --configuration Release --no-restore
        
      - name: Ensure nupkg directory exists
        run: mkdir -p ${{ github.workspace }}/nupkg


      - name: Pack
        run: |
            dotnet pack Catalogs/Catalogs.csproj \
            --configuration Release \
            --no-build \
            -o ${{ github.workspace }}/nupkg


      - name: Push package to Azure DevOps Artifacts
        run: |
          dotnet nuget push "${{ github.workspace }}/nupkg/*.nupkg" \
           --source AzureArtifacts \
           --api-key AzureDevOps \
           --skip-duplicate
           
       # 4️⃣ Build the web app
      - name: Build Web App
        run: dotnet build Catalogs/Catalogs.csproj --configuration Release --no-restore

      # 5️⃣ Publish the web app
      - name: Publish Web App
        run: dotnet publish Catalogs/Catalogs.csproj \
              --configuration Release \
              --output ${{ github.workspace }}/publish \
              --no-build

      # 6️⃣ Verify publish folder (optional but recommended)
      - name: List published files
        run: ls -R ${{ github.workspace }}/publish

      # 7️⃣ Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: Azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILEV1 }}
          package: ${{ github.workspace }}/publish



